<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<title>terminal_OpS Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Heebo:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17;
  --bg-secondary: #111827;
  --card: rgba(17, 24, 39, 0.8);
  --card-solid: #111827;
  --border: rgba(56, 189, 248, 0.12);
  --border-light: rgba(56, 189, 248, 0.06);
  --border-hover: rgba(56, 189, 248, 0.25);
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #00d4ff;
  --accent-dim: rgba(0, 212, 255, 0.15);
  --success: #10b981;
  --success-dim: rgba(16, 185, 129, 0.15);
  --warning: #f59e0b;
  --warning-dim: rgba(245, 158, 11, 0.15);
  --danger: #ef4444;
  --danger-dim: rgba(239, 68, 68, 0.15);
  --purple: #8b5cf6;
  --purple-dim: rgba(139, 92, 246, 0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59, 130, 246, 0.15);
  --teal: #14b8a6;
  --teal-dim: rgba(20, 184, 166, 0.15);
  --pink: #ec4899;
  --pink-dim: rgba(236, 72, 153, 0.15);
  --shadow: 0 4px 20px rgba(0,0,0,0.3);
  --shadow-glow: 0 0 20px rgba(0, 212, 255, 0.1);
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Heebo', 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  font-weight: 300;
  line-height: 1.6;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(0,212,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(139,92,246,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}
.container { max-width: 900px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 1; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* Header */
.header { padding: 28px 0 20px; margin-bottom: 4px; }
.header h1 {
  font-size: 28px; font-weight: 300; color: var(--accent);
  letter-spacing: 1px; text-transform: uppercase;
  text-shadow: 0 0 30px rgba(0,212,255,0.3);
}
.header h1 span { color: var(--text-muted); font-weight: 200; }
.header p { color: var(--text-muted); font-size: 13px; font-weight: 300; margin-top: 4px; }

/* Sync bar */
.sync-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; background: var(--card); backdrop-filter: blur(12px);
  border-radius: var(--radius); margin-bottom: 16px; font-size: 12px;
  border: 1px solid var(--border);
}
.sync-status { display: flex; align-items: center; gap: 8px; color: var(--text-secondary); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.sync-dot.ok { background: var(--success); box-shadow: 0 0 8px var(--success); }
.sync-dot.err { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
.sync-dot.loading { background: var(--warning); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat {
  background: var(--card); backdrop-filter: blur(12px);
  border-radius: var(--radius); padding: 16px 12px; text-align: center;
  border: 1px solid var(--border); transition: all 0.3s;
}
.stat:hover { border-color: var(--border-hover); box-shadow: var(--shadow-glow); }
.stat-val { font-size: 24px; font-weight: 400; letter-spacing: -0.5px; }
.stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.5px; }

/* Progress */
.progress-wrap {
  background: var(--card); backdrop-filter: blur(12px);
  border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
  border: 1px solid var(--border);
}
.progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-weight: 400; }
.progress-bar { background: rgba(255,255,255,0.05); border-radius: 20px; height: 6px; overflow: hidden; }
.progress-fill {
  height: 100%; border-radius: 20px; transition: width 0.4s ease;
  background: linear-gradient(90deg, var(--accent), var(--purple));
  box-shadow: 0 0 12px rgba(0,212,255,0.4);
}

/* Buttons */
.btn {
  border: none; border-radius: var(--radius-sm); padding: 8px 16px;
  cursor: pointer; font-weight: 400; font-size: 12px; font-family: inherit;
  transition: all 0.2s; letter-spacing: 0;
}
.btn-accent { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }
.btn-accent:hover { background: rgba(0,212,255,0.25); box-shadow: 0 0 12px rgba(0,212,255,0.2); }
.btn-success { background: var(--success-dim); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
.btn-success:hover { background: rgba(16,185,129,0.25); }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-sm { padding: 5px 12px; font-size: 11px; }

/* Hours section */
.hours-section {
  background: var(--card); backdrop-filter: blur(12px);
  border-radius: var(--radius); padding: 18px; margin-bottom: 16px;
  border: 1px solid var(--border);
}
.hours-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.hours-header h2 { font-size: 15px; font-weight: 400; color: var(--accent); }
.hours-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.form-group label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; font-weight: 300; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text);
  font-size: 13px; font-family: inherit; font-weight: 300; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 8px rgba(0,212,255,0.15); }
.form-group select option { background: var(--bg-secondary); color: var(--text); }
.hours-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
.hours-table th { text-align: right; padding: 6px 4px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 400; }
.hours-table td { padding: 6px 4px; font-weight: 300; }
.hours-summary {
  display: flex; gap: 16px; font-size: 12px; margin-top: 12px;
  padding-top: 12px; border-top: 1px solid var(--border); flex-wrap: wrap; font-weight: 300;
}

/* Search & filters */
.controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.search {
  flex: 1; min-width: 140px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 14px; color: var(--text);
  font-size: 13px; font-family: inherit; font-weight: 300; transition: border-color 0.2s;
}
.search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 8px rgba(0,212,255,0.15); }
.search::placeholder { color: var(--text-muted); }
.filter-btn {
  background: var(--card); color: var(--text-secondary); border: 1px solid var(--border);
  border-radius: 20px; padding: 7px 16px; cursor: pointer; font-size: 12px;
  font-family: inherit; font-weight: 300; transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

/* Groups */
.group {
  margin-bottom: 16px; border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
  background: rgba(17, 24, 39, 0.5); backdrop-filter: blur(12px);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.group.drag-over { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,212,255,0.15); }
.group-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; cursor: pointer; transition: background 0.15s;
  border-bottom: 1px solid var(--border-light);
}
.group-header:hover { background: rgba(0,212,255,0.03); }
.group-title { display: flex; align-items: center; gap: 10px; }
.group-title .arrow { font-size: 10px; transition: transform 0.2s; color: var(--text-muted); }
.group-title .name { font-weight: 400; font-size: 15px; color: var(--text); }
.group-title .count { font-size: 11px; color: var(--text-muted); }
.group-progress { display: flex; align-items: center; gap: 10px; min-width: 120px; }
.group-bar { flex: 1; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.group-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.group-pct { font-size: 12px; color: var(--text-muted); min-width: 32px; text-align: left; font-weight: 400; }
.group-actions { display: flex; gap: 4px; align-items: center; }
.group-body { padding: 8px; }

/* Category (draggable) */
.category {
  margin-bottom: 6px; background: var(--card-solid);
  border-radius: var(--radius-sm); overflow: hidden;
  border: 1px solid var(--border-light); transition: all 0.2s;
  cursor: grab;
}
.category:active { cursor: grabbing; }
.category.dragging { opacity: 0.4; border-color: var(--accent); }
.category:hover { border-color: var(--border-hover); }
.cat-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; cursor: pointer; transition: background 0.15s;
}
.cat-header:hover { background: rgba(255,255,255,0.02); }
.cat-header .info { display: flex; align-items: center; gap: 10px; pointer-events: none; }
.cat-header .arrow { font-size: 10px; transition: transform 0.2s; color: var(--text-muted); }
.cat-header .name { font-weight: 400; font-size: 13px; }
.cat-header .count {
  font-size: 10px; color: var(--text-muted); background: rgba(255,255,255,0.05);
  border-radius: 12px; padding: 2px 8px; font-weight: 300;
}
.cat-progress { display: flex; align-items: center; gap: 8px; pointer-events: none; }
.cat-bar { width: 50px; height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
.cat-fill { height: 100%; border-radius: 2px; }
.cat-pct { font-size: 11px; color: var(--text-muted); min-width: 28px; text-align: left; font-weight: 300; }

/* Task list */
.task-list { padding: 0 14px 10px; }
.task {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border-light); transition: background 0.15s;
}
.task:last-child { border-bottom: none; }
.task:hover { background: rgba(255,255,255,0.01); }
.task input[type=checkbox] {
  -webkit-appearance: none; appearance: none; width: 18px; height: 18px;
  border: 1.5px solid var(--border); border-radius: 5px; cursor: pointer;
  flex-shrink: 0; transition: all 0.2s; position: relative; background: transparent; margin-top: 2px;
}
.task input[type=checkbox]:hover { border-color: var(--accent); }
.task input[type=checkbox]:checked { background: var(--success); border-color: var(--success); box-shadow: 0 0 8px rgba(16,185,129,0.3); }
.task input[type=checkbox]:checked::after {
  content: ''; position: absolute; left: 5px; top: 2px; width: 5px; height: 9px;
  border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
}
.task-content { flex: 1; min-width: 0; }
.task-text { font-size: 13px; font-weight: 300; display: block; }
.task-text.done { text-decoration: line-through; color: var(--text-muted); }
.task-meta { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }

/* Tags */
.tag {
  font-size: 9px; border-radius: 4px; padding: 2px 6px;
  white-space: nowrap; font-weight: 400; cursor: pointer; transition: all 0.2s;
  border: 1px solid transparent;
}
.tag:hover { filter: brightness(1.3); }
.tag-green { background: var(--success-dim); color: var(--success); }
.tag-orange { background: var(--warning-dim); color: var(--warning); }
.tag-purple { background: var(--purple-dim); color: var(--purple); }
.tag-blue { background: var(--blue-dim); color: var(--blue); }
.tag-pink { background: var(--pink-dim); color: var(--pink); }
.tag-cyan { background: var(--accent-dim); color: var(--accent); }
.tag-add {
  background: transparent; border: 1px dashed var(--border);
  color: var(--text-muted); font-size: 9px; padding: 2px 6px;
  border-radius: 4px; cursor: pointer;
}
.tag-add:hover { border-color: var(--accent); color: var(--accent); }

/* Note indicator */
.note-icon {
  font-size: 11px; color: var(--text-muted); cursor: pointer; transition: color 0.2s;
  flex-shrink: 0; margin-top: 2px; padding: 2px;
}
.note-icon:hover { color: var(--accent); }
.note-icon.has-note { color: var(--warning); }

/* Note popup */
.note-popup {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px; margin-top: 4px;
}
.note-popup textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 6px 8px; color: var(--text); font-size: 12px;
  font-family: inherit; resize: vertical; min-height: 50px;
}
.note-popup textarea:focus { outline: none; border-color: var(--accent); }

/* Tag input popup */
.tag-input-popup {
  background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px; margin-top: 4px;
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.tag-input-popup input {
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 8px; color: var(--text); font-size: 12px; font-family: inherit; flex: 1; min-width: 100px;
}
.tag-input-popup input:focus { outline: none; border-color: var(--accent); }
.tag-color-dot {
  width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.2s;
}
.tag-color-dot:hover, .tag-color-dot.active { border-color: #fff; transform: scale(1.2); }

/* Inline edit input */
.inline-edit {
  background: var(--bg); border: 1px solid var(--accent); border-radius: 4px;
  padding: 4px 8px; color: var(--text); font-size: 14px; font-family: inherit; font-weight: 400;
}
.inline-edit:focus { outline: none; box-shadow: 0 0 8px rgba(0,212,255,0.2); }

/* Footer */
.footer {
  text-align: center; padding: 24px 0; color: var(--text-muted);
  font-size: 11px; font-weight: 300;
}
.footer a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
.footer a:hover { color: var(--accent); }

/* Setup */
.setup-box {
  background: var(--card); border: 1.5px dashed var(--accent);
  border-radius: var(--radius); padding: 28px 24px; margin-bottom: 16px; text-align: center;
  backdrop-filter: blur(12px);
}
.setup-box h3 { color: var(--accent); margin-bottom: 12px; font-weight: 400; font-size: 16px; }
.setup-box input {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text);
  font-size: 13px; margin: 5px 0; font-family: inherit; font-weight: 300; direction: ltr;
}
.setup-box input:focus { outline: none; border-color: var(--accent); }

/* Error box */
.error-box {
  background: var(--danger-dim); border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px;
  font-size: 12px; color: var(--danger); font-weight: 300;
}

/* Divider */
.divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 4px 0 16px; }

/* Add task form */
.add-task-form {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; margin-bottom: 12px; backdrop-filter: blur(12px);
}
.add-task-form input, .add-task-form select {
  padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; background: var(--bg); color: var(--text);
}
.add-task-form input:focus, .add-task-form select:focus { outline: none; border-color: var(--accent); }
.add-task-form select option { background: var(--bg-secondary); color: var(--text); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

@media(max-width:600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .hours-form { grid-template-columns: 1fr 1fr; }
  .container { padding: 12px; }
  .group-progress { min-width: 80px; }
}
</style>

<body>
<div class="container" id="app"></div>
<script>
// ============ CONFIG ============
const CFG_KEY = 'manager-config';
const HOURS_KEY = 'manager-work-hours-v2';

const CAT_COLORS = {
  'מיידי':'#ef4444','באגים':'#f59e0b',"פיצ'רים עמר":'#8b5cf6',
  "פיצ'רים יובל לי":'#3b82f6','טווח קרוב':'#14b8a6','טווח רחוק':'#64748b',
  'Production':'#10b981','n8n אימות':'#ec4899'
};

const TAG_COLORS = ['cyan','green','orange','purple','blue','pink'];
const GROUP_COLORS = ['#00d4ff','#8b5cf6','#10b981','#f59e0b','#ec4899','#3b82f6','#ef4444','#14b8a6'];

let config = null;
let state = {
  tasks: {}, hours: [], filter: 'all', search: '', collapsed: {},
  showHoursForm: false, showSetup: false, showAddTask: false,
  syncStatus: 'loading', syncError: '', lastSync: null,
  groups: [], groupCollapsed: {}, editingGroup: null,
  dragCat: null, dragOverGroup: null,
  editingNote: null, addingTag: null, tagColor: 'cyan'
};

const DEFAULT_DB_URL = 'https://manager-dashboard-b8627-default-rtdb.firebaseio.com';
const DEFAULT_API_KEY = 'AIzaSyCYVWc3_hOJadijX6Ebclz5VCEWthhuw8w';
const DEFAULT_PROJECT_ID = 'manager-dashboard-b8627';
const DEFAULT_APP_ID = '1:1062866166372:web:7d0e514cd12b357e89b571';

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function loadConfig() {
  try { config = JSON.parse(localStorage.getItem(CFG_KEY)); } catch {}
  if (!config || !config.databaseURL) {
    config = { databaseURL: DEFAULT_DB_URL, apiKey: DEFAULT_API_KEY, projectId: DEFAULT_PROJECT_ID, appId: DEFAULT_APP_ID };
    saveConfig();
  }
}
function saveConfig() { try { localStorage.setItem(CFG_KEY, JSON.stringify(config)); } catch {} }
function loadHours() { try { state.hours = JSON.parse(localStorage.getItem(HOURS_KEY)) || []; } catch { state.hours = []; } }
function saveHours() { try { localStorage.setItem(HOURS_KEY, JSON.stringify(state.hours)); } catch {} }

// ============ FIREBASE ============
let db = null;

function initFirebase() {
  if (!config || !config.databaseURL) return;
  if (!firebase.apps.length) {
    firebase.initializeApp({ apiKey: config.apiKey || '', databaseURL: config.databaseURL, projectId: config.projectId || '', appId: config.appId || '' });
  }
  db = firebase.database();
  state.syncStatus = 'loading';
  render();

  db.ref('tasks').on('value', (snap) => {
    const data = snap.val();
    state.tasks = data ? firebaseToTasks(data) : {};
    state.syncStatus = 'ok'; state.syncError = ''; state.lastSync = Date.now();
    render();
  }, (err) => {
    state.syncStatus = 'err'; state.syncError = err.message; render();
  });

  db.ref('groups').on('value', (snap) => {
    const data = snap.val();
    if (data) {
      state.groups = Object.entries(data).map(([id, g]) => ({ id, ...g, categories: g.categories || [] }));
    } else {
      state.groups = [];
    }
    render();
  });
}

function firebaseToTasks(data) {
  const cats = {};
  for (const [id, t] of Object.entries(data)) {
    const cat = t.category || 'אחר';
    if (!cats[cat]) cats[cat] = { color: CAT_COLORS[cat] || '#64748b', tasks: [] };
    cats[cat].tasks.push({
      id: parseInt(id) || 0, text: t.text || '', done: !!t.done,
      v: !!t.verified, n: t.note || '', est: parseFloat(t.est) || 0,
      priority: parseInt(t.priority) || 9,
      tags: t.tags || [], comment: t.comment || ''
    });
  }
  return cats;
}

function updateTaskInFirebase(id, updates) {
  if (!db) return;
  db.ref('tasks/' + id).update(updates).catch((e) => {
    state.syncStatus = 'err'; state.syncError = e.message; render();
  });
}

function saveGroupsToFirebase() {
  if (!db) return;
  const groupData = {};
  state.groups.forEach(g => { groupData[g.id] = { name: g.name, color: g.color, categories: g.categories || [] }; });
  db.ref('groups').set(groupData).catch(e => console.error('Groups save failed:', e));
}

// ============ GROUP HELPERS ============
function getGroupedCategories() {
  const assigned = new Set();
  state.groups.forEach(g => (g.categories || []).forEach(c => assigned.add(c)));
  const unassigned = Object.keys(state.tasks).filter(c => !assigned.has(c));
  return { assigned, unassigned };
}

function getGroupStats(cats) {
  let total = 0, done = 0;
  cats.forEach(cat => {
    if (state.tasks[cat]) {
      state.tasks[cat].tasks.forEach(t => { total++; if (t.done) done++; });
    }
  });
  return { total, done, pct: total > 0 ? Math.round(done / total * 100) : 0 };
}

// ============ RENDER ============
function render() {
  const app = document.getElementById('app');

  if (state.showSetup || !config || !config.databaseURL) {
    app.innerHTML = renderSetup(); return;
  }

  const allTasks = Object.values(state.tasks).flatMap(c => c.tasks);
  const total = allTasks.length, done = allTasks.filter(t => t.done).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const totalHours = state.hours.reduce((s, e) => s + (parseFloat(e.hours) || 0), 0);
  const daysWorked = new Set(state.hours.map(e => e.date)).size;
  const deadline = new Date('2026-03-31'), today = new Date();
  const daysLeft = Math.max(0, Math.ceil((deadline - today) / 864e5));
  const remaining = total - done;
  const pace = daysLeft > 0 ? (remaining / daysLeft).toFixed(1) : '--';
  const syncTime = state.lastSync ? new Date(state.lastSync).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' }) : '---';

  let h = '';

  // Header
  h += `<div class="header">
    <h1>terminal<span>_</span>OpS <span style="font-size:18px;color:var(--text-muted)">Dashboard</span></h1>
    <p class="mono" style="font-size:11px">${daysLeft} days remaining &middot; sprint deadline 31.03</p>
  </div>`;

  // Sync
  h += `<div class="sync-bar">
    <div class="sync-status"><span class="sync-dot ${state.syncStatus}"></span>
    <span class="mono">${state.syncStatus === 'ok' ? 'SYNCED' : state.syncStatus === 'loading' ? 'SYNCING...' : 'ERROR'}</span>
    &middot; ${syncTime}</div>
    <button class="btn btn-ghost btn-sm" onclick="location.reload()">Refresh</button>
  </div>`;

  if (state.syncError) h += `<div class="error-box">${escapeHtml(state.syncError)}</div>`;

  // Stats
  h += `<div class="stats">
    <div class="stat"><div class="stat-val mono" style="color:var(--blue)">${total}</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val mono" style="color:var(--success)">${done}</div><div class="stat-lbl">Done (${pct}%)</div></div>
    <div class="stat"><div class="stat-val mono" style="color:var(--danger)">${remaining}</div><div class="stat-lbl">Remaining</div></div>
    <div class="stat"><div class="stat-val mono" style="color:var(--purple)">${pace}/d</div><div class="stat-lbl">Pace needed</div></div>
    <div class="stat"><div class="stat-val mono" style="color:var(--teal)">${totalHours.toFixed(1)}</div><div class="stat-lbl">Hours</div></div>
    <div class="stat"><div class="stat-val mono" style="color:var(--warning)">${daysWorked}</div><div class="stat-lbl">Days worked</div></div>
  </div>`;

  // Overall progress
  h += `<div class="progress-wrap">
    <div class="progress-header"><span>Overall progress</span><span class="mono" style="color:var(--accent)">${pct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;

  // Hours
  h += renderHours(totalHours, daysWorked);
  h += `<div class="divider"></div>`;

  // Controls
  h += `<div class="controls">
    <input class="search" placeholder="Search tasks..." value="${escapeHtml(state.search)}" oninput="setSearch(this.value)">
    <button class="filter-btn ${state.filter==='all'?'active':''}" onclick="setFilter('all')">All</button>
    <button class="filter-btn ${state.filter==='open'?'active':''}" onclick="setFilter('open')">Open</button>
    <button class="filter-btn ${state.filter==='done'?'active':''}" onclick="setFilter('done')">Done</button>
    <button class="btn btn-ghost btn-sm" onclick="toggleAddTask()" style="margin-right:auto">+ Task</button>
    <button class="btn btn-accent btn-sm" onclick="promptAddGroup()">+ Group</button>
  </div>`;

  if (state.showAddTask) h += renderAddTaskForm();

  // Groups
  const { unassigned } = getGroupedCategories();
  state.groups.forEach(g => { h += renderGroup(g); });

  // Ungrouped
  if (unassigned.length > 0) h += renderUngroupedSection(unassigned);

  // Footer
  h += `<div class="footer">
    terminal_OpS Dashboard &middot; <span class="mono">${new Date().toLocaleDateString('he-IL')}</span>
    <br><a href="#" onclick="resetConfig()">Settings</a>
  </div>`;

  app.innerHTML = h;
}

function renderSetup() {
  return `
  <div class="header"><h1>terminal<span>_</span>OpS</h1><p>Setup</p></div>
  <div class="setup-box">
    <h3>Firebase Connection</h3>
    <p style="color:var(--text-muted);font-size:12px;margin-bottom:14px">Connect your Firebase Realtime Database</p>
    <input id="cfg-dburl" placeholder="Database URL" value="${config?.databaseURL || ''}">
    <input id="cfg-apikey" placeholder="API Key" value="${config?.apiKey || ''}">
    <input id="cfg-projectid" placeholder="Project ID" value="${config?.projectId || ''}">
    <input id="cfg-appid" placeholder="App ID" value="${config?.appId || ''}">
    <br><button class="btn btn-accent" onclick="saveSetup()" style="margin-top:10px;width:100%;padding:10px">Connect</button>
  </div>`;
}

function renderHours(totalHours, daysWorked) {
  let h = `<div class="hours-section">
    <div class="hours-header"><h2>Work hours</h2><button class="btn btn-ghost btn-sm" onclick="toggleHoursForm()">${state.showHoursForm ? 'Cancel' : '+ Add'}</button></div>`;
  if (state.showHoursForm) {
    h += `<div class="hours-form">
      <div class="form-group"><label>Date</label><input type="date" id="h-date" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="form-group"><label>Hours</label><input type="number" id="h-hours" step="0.5" min="0" max="16" placeholder="3.5" style="direction:ltr"></div>
      <div class="form-group"><label>Location</label><select id="h-loc"><option>Home</option><option>Office</option><option>Field</option></select></div>
      <div class="form-group"><label>Notes</label><input type="text" id="h-notes" placeholder="What did you work on..."></div>
    </div><button class="btn btn-success" onclick="addHours()" style="width:100%;margin-bottom:8px">Save</button>`;
  }
  if (state.hours.length > 0) {
    h += `<div style="max-height:180px;overflow-y:auto"><table class="hours-table"><thead><tr><th>Date</th><th style="text-align:center">Hours</th><th style="text-align:center">Location</th><th>Notes</th><th></th></tr></thead><tbody>`;
    for (let e of [...state.hours].reverse()) {
      h += `<tr><td class="mono">${e.date}</td><td style="text-align:center;color:var(--teal);font-weight:400" class="mono">${e.hours}</td><td style="text-align:center">${e.location}</td><td style="color:var(--text-secondary)">${escapeHtml(e.notes || '')}</td><td><button class="btn" style="background:none;color:var(--danger);font-size:13px;padding:2px" onclick="delHours(${e.id})">x</button></td></tr>`;
    }
    h += `</tbody></table></div>`;
  }
  const avg = daysWorked > 0 ? (totalHours / daysWorked).toFixed(1) : '0';
  h += `<div class="hours-summary"><span>Total: <b style="color:var(--teal)" class="mono">${totalHours.toFixed(1)}h</b></span><span>Avg: <b style="color:var(--purple)" class="mono">${avg}h/day</b></span></div></div>`;
  return h;
}

function renderAddTaskForm() {
  const catOptions = Object.keys(CAT_COLORS).map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  return `<div class="add-task-form">
    <input id="new-task-text" placeholder="תיאור המשימה..." style="width:100%;margin-bottom:8px">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select id="new-task-cat" onchange="document.getElementById('new-task-custom-cat').style.display=this.value==='__custom__'?'inline-block':'none'">
        ${catOptions}
        <option value="__custom__">+ קטגוריה חדשה</option>
      </select>
      <input id="new-task-custom-cat" placeholder="שם קטגוריה" style="display:none;width:140px">
      <input id="new-task-tags" placeholder="תגיות (מופרדות בפסיקים)" style="width:160px">
      <button class="btn btn-success btn-sm" onclick="addTask()">Add</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleAddTask()">Cancel</button>
    </div>
  </div>`;
}

function renderGroup(g) {
  const stats = getGroupStats(g.categories || []);
  const isCol = state.groupCollapsed[g.id];
  const isEditing = state.editingGroup === g.id;
  const safeId = escapeHtml(g.id);

  let h = `<div class="group ${state.dragOverGroup === g.id ? 'drag-over' : ''}"
    ondragover="onDragOverGroup(event, '${safeId}')" ondragleave="onDragLeaveGroup(event)" ondrop="onDropGroup(event, '${safeId}')">
    <div class="group-header" onclick="toggleGroupCollapse('${safeId}')">
      <div class="group-title">
        <span class="arrow" style="transform:rotate(${isCol?'-90':'0'}deg)">&#9662;</span>
        <span style="width:4px;height:20px;border-radius:2px;background:${g.color};display:inline-block;box-shadow:0 0 8px ${g.color}40"></span>`;
  if (isEditing) {
    h += `<input class="inline-edit" id="edit-group-${safeId}" value="${escapeHtml(g.name)}" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')saveGroupName('${safeId}')" style="width:150px">
      <button class="btn btn-success btn-sm" onclick="event.stopPropagation();saveGroupName('${safeId}')">OK</button>`;
  } else {
    h += `<span class="name">${escapeHtml(g.name)}</span>
      <span class="count">${stats.done}/${stats.total}</span>`;
  }
  h += `</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="group-progress">
          <div class="group-bar"><div class="group-fill" style="width:${stats.pct}%;background:${g.color};box-shadow:0 0 8px ${g.color}60"></div></div>
          <span class="group-pct mono">${stats.pct}%</span>
        </div>
        <div class="group-actions" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-sm" onclick="startEditGroup('${safeId}')" title="Rename">&#9998;</button>
          <button class="btn btn-ghost btn-sm" onclick="deleteGroup('${safeId}')" title="Delete" style="color:var(--danger)">&#10005;</button>
        </div>
      </div>
    </div>`;

  if (!isCol) {
    h += `<div class="group-body">`;
    (g.categories || []).forEach(cat => {
      if (state.tasks[cat]) h += renderCategory(cat, state.tasks[cat]);
    });
    if ((g.categories || []).length === 0) {
      h += `<p style="color:var(--text-muted);font-size:12px;padding:12px;text-align:center">Drag categories here</p>`;
    }
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

function renderUngroupedSection(unassigned) {
  const stats = getGroupStats(unassigned);
  const isCol = state.groupCollapsed['__ungrouped__'];

  let h = `<div class="group ${state.dragOverGroup === '__ungrouped__' ? 'drag-over' : ''}"
    ondragover="onDragOverGroup(event, '__ungrouped__')" ondragleave="onDragLeaveGroup(event)" ondrop="onDropGroup(event, '__ungrouped__')">
    <div class="group-header" onclick="toggleGroupCollapse('__ungrouped__')">
      <div class="group-title">
        <span class="arrow" style="transform:rotate(${isCol?'-90':'0'}deg)">&#9662;</span>
        <span style="width:4px;height:20px;border-radius:2px;background:var(--text-muted);display:inline-block"></span>
        <span class="name" style="color:var(--text-muted)">Ungrouped</span>
        <span class="count">${stats.done}/${stats.total}</span>
      </div>
      <div class="group-progress">
        <div class="group-bar"><div class="group-fill" style="width:${stats.pct}%;background:var(--text-muted)"></div></div>
        <span class="group-pct mono">${stats.pct}%</span>
      </div>
    </div>`;
  if (!isCol) {
    h += `<div class="group-body">`;
    unassigned.forEach(cat => { if (state.tasks[cat]) h += renderCategory(cat, state.tasks[cat]); });
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

function renderCategory(cat, catData) {
  const { color, tasks } = catData;
  const filtered = tasks.filter(t => {
    if (state.filter === 'open' && t.done) return false;
    if (state.filter === 'done' && !t.done) return false;
    if (state.search && !t.text.includes(state.search)) return false;
    return true;
  });
  if (filtered.length === 0 && state.search) return '';

  const catDone = tasks.filter(t => t.done).length;
  const catPct = tasks.length > 0 ? Math.round(catDone / tasks.length * 100) : 0;
  const isCol = state.collapsed[cat];
  const safeCat = escapeHtml(cat);

  let h = `<div class="category" draggable="true" ondragstart="onDragStartCat(event, '${safeCat}')" ondragend="onDragEndCat(event)" id="cat-${safeCat}">
    <div class="cat-header" onclick="toggleCat('${safeCat}')">
      <div class="info">
        <span class="arrow" style="transform:rotate(${isCol?'-90':'0'}deg)">&#9662;</span>
        <span style="width:3px;height:16px;border-radius:2px;background:${color};display:inline-block;box-shadow:0 0 6px ${color}40"></span>
        <span class="name">${safeCat}</span>
        <span class="count">${catDone}/${tasks.length}</span>
      </div>
      <div class="cat-progress">
        <div class="cat-bar"><div class="cat-fill" style="width:${catPct}%;background:${color};box-shadow:0 0 6px ${color}60"></div></div>
        <span class="cat-pct mono">${catPct}%</span>
      </div>
    </div>`;

  if (!isCol) {
    h += `<div class="task-list">`;
    for (let t of filtered) h += renderTask(t);
    if (filtered.length === 0) h += `<p style="color:var(--text-muted);font-size:12px;padding:8px 0">No tasks</p>`;
    h += `</div>`;
  }
  h += `</div>`;
  return h;
}

function renderTask(t) {
  const tags = t.tags || [];
  const hasComment = t.comment && t.comment.trim().length > 0;
  const isEditingNote = state.editingNote === t.id;
  const isAddingTag = state.addingTag === t.id;

  let h = `<div class="task">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggle(${t.id})">
    <div class="task-content">
      <span class="task-text ${t.done?'done':''}">${escapeHtml(t.text)}</span>
      <div class="task-meta">`;

  if (t.v) h += `<span class="tag tag-green">Verified</span>`;
  if (t.n) h += `<span class="tag tag-orange">${escapeHtml(t.n)}</span>`;

  tags.forEach((tag, i) => {
    const colorClass = 'tag-' + (tag.color || 'cyan');
    h += `<span class="tag ${colorClass}" onclick="removeTag(${t.id}, ${i})" title="Click to remove">${escapeHtml(tag.text)} &#10005;</span>`;
  });

  h += `<span class="tag-add" onclick="startAddTag(${t.id})">+ tag</span>`;
  h += `</div>`;

  // Tag input
  if (isAddingTag) {
    h += `<div class="tag-input-popup">
      <input id="tag-input-${t.id}" placeholder="Tag text..." onkeydown="if(event.key==='Enter')saveTag(${t.id})">`;
    TAG_COLORS.forEach(c => {
      h += `<span class="tag-color-dot ${state.tagColor===c?'active':''}" style="background:var(--${c})" onclick="state.tagColor='${c}';render()"></span>`;
    });
    h += `<button class="btn btn-success btn-sm" onclick="saveTag(${t.id})">+</button>
      <button class="btn btn-ghost btn-sm" onclick="state.addingTag=null;render()">x</button>
    </div>`;
  }

  // Comment
  if (isEditingNote) {
    h += `<div class="note-popup">
      <textarea id="note-input-${t.id}" placeholder="Write a comment...">${escapeHtml(t.comment || '')}</textarea>
      <div style="display:flex;gap:4px;margin-top:4px">
        <button class="btn btn-success btn-sm" onclick="saveComment(${t.id})">Save</button>
        <button class="btn btn-ghost btn-sm" onclick="state.editingNote=null;render()">Cancel</button>
      </div>
    </div>`;
  } else if (hasComment) {
    h += `<div style="font-size:11px;color:var(--text-secondary);margin-top:4px;padding:4px 8px;background:rgba(255,255,255,0.02);border-radius:4px;border-right:2px solid var(--accent)">${escapeHtml(t.comment)}</div>`;
  }

  h += `</div>
    <span class="note-icon ${hasComment?'has-note':''}" onclick="startEditNote(${t.id})" title="Comment">&#128172;</span>
  </div>`;
  return h;
}

// ============ ACTIONS ============
function saveSetup() {
  const databaseURL = document.getElementById('cfg-dburl').value.trim();
  const apiKey = document.getElementById('cfg-apikey').value.trim();
  const projectId = document.getElementById('cfg-projectid').value.trim();
  const appId = document.getElementById('cfg-appid').value.trim();
  if (!databaseURL) return alert('Missing Database URL');
  config = { databaseURL, apiKey, projectId, appId };
  state.showSetup = false; saveConfig(); initFirebase();
}

function resetConfig() { state.showSetup = !state.showSetup; render(); }
function toggle(id) {
  for (let cat of Object.values(state.tasks)) {
    for (let t of cat.tasks) {
      if (t.id === id) { t.done = !t.done; render(); updateTaskInFirebase(id, { done: t.done }); return; }
    }
  }
}
function setFilter(f) { state.filter = f; render(); }
function setSearch(v) { state.search = v; render(); }
function toggleCat(c) { state.collapsed[c] = !state.collapsed[c]; render(); }
function toggleGroupCollapse(id) { state.groupCollapsed[id] = !state.groupCollapsed[id]; render(); }
function toggleHoursForm() { state.showHoursForm = !state.showHoursForm; render(); }
function toggleAddTask() { state.showAddTask = !state.showAddTask; render(); }

function addHours() {
  const d = document.getElementById('h-date').value;
  const hrs = document.getElementById('h-hours').value;
  const loc = document.getElementById('h-loc').value;
  const notes = document.getElementById('h-notes').value;
  if (!hrs) return;
  state.hours.push({ id: Date.now(), date: d, hours: hrs, location: loc, notes });
  state.showHoursForm = false; saveHours(); render();
}
function delHours(id) { state.hours = state.hours.filter(e => e.id !== id); saveHours(); render(); }

function addTask() {
  const text = document.getElementById('new-task-text').value.trim();
  if (!text) return alert('הכנס תיאור למשימה');
  const catSelect = document.getElementById('new-task-cat');
  let cat = catSelect.value;
  if (cat === '__custom__') {
    cat = document.getElementById('new-task-custom-cat').value.trim();
    if (!cat) return alert('הכנס שם קטגוריה');
  }
  if (!db) return alert('Firebase not connected');

  const tagsInput = document.getElementById('new-task-tags').value.trim();
  const tags = tagsInput ? tagsInput.split(',').map((t, i) => ({ text: t.trim(), color: TAG_COLORS[i % TAG_COLORS.length] })).filter(t => t.text) : [];

  const id = Date.now();
  db.ref('tasks/' + id).set({ text, done: false, verified: false, note: '', est: 0, priority: 9, category: cat, tags, comment: '' })
    .then(() => { state.showAddTask = false; })
    .catch(e => alert('Error: ' + e.message));
}

// Tags
function startAddTag(id) { state.addingTag = id; state.tagColor = 'cyan'; render(); setTimeout(() => { const el = document.getElementById('tag-input-' + id); if (el) el.focus(); }, 50); }
function saveTag(id) {
  const el = document.getElementById('tag-input-' + id);
  if (!el) return;
  const text = el.value.trim();
  if (!text) return;
  for (let cat of Object.values(state.tasks)) {
    for (let t of cat.tasks) {
      if (t.id === id) {
        const tags = [...(t.tags || []), { text, color: state.tagColor }];
        t.tags = tags; state.addingTag = null; render();
        updateTaskInFirebase(id, { tags });
        return;
      }
    }
  }
}
function removeTag(id, index) {
  for (let cat of Object.values(state.tasks)) {
    for (let t of cat.tasks) {
      if (t.id === id) {
        const tags = [...(t.tags || [])]; tags.splice(index, 1);
        t.tags = tags; render();
        updateTaskInFirebase(id, { tags });
        return;
      }
    }
  }
}

// Comments
function startEditNote(id) { state.editingNote = id; render(); setTimeout(() => { const el = document.getElementById('note-input-' + id); if (el) el.focus(); }, 50); }
function saveComment(id) {
  const el = document.getElementById('note-input-' + id);
  if (!el) return;
  const comment = el.value;
  for (let cat of Object.values(state.tasks)) {
    for (let t of cat.tasks) {
      if (t.id === id) {
        t.comment = comment; state.editingNote = null; render();
        updateTaskInFirebase(id, { comment });
        return;
      }
    }
  }
}

// Groups
function promptAddGroup() {
  const name = prompt('Group name:');
  if (!name || !name.trim()) return;
  const id = 'g_' + Date.now();
  const color = GROUP_COLORS[state.groups.length % GROUP_COLORS.length];
  state.groups.push({ id, name: name.trim(), color, categories: [] });
  saveGroupsToFirebase();
}
function startEditGroup(id) { state.editingGroup = id; render(); setTimeout(() => { const el = document.getElementById('edit-group-' + id); if (el) { el.focus(); el.select(); } }, 50); }
function saveGroupName(id) {
  const el = document.getElementById('edit-group-' + id);
  if (!el) return;
  const name = el.value.trim();
  if (!name) return;
  const g = state.groups.find(g => g.id === id);
  if (g) { g.name = name; state.editingGroup = null; render(); saveGroupsToFirebase(); }
}
function deleteGroup(id) {
  if (!confirm('Delete this group? Categories will move to Ungrouped.')) return;
  state.groups = state.groups.filter(g => g.id !== id);
  saveGroupsToFirebase();
}

// Drag & drop
function onDragStartCat(e, cat) {
  state.dragCat = cat;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', cat);
  setTimeout(() => { const el = document.getElementById('cat-' + cat); if (el) el.classList.add('dragging'); }, 0);
}
function onDragEndCat(e) {
  state.dragCat = null; state.dragOverGroup = null;
  document.querySelectorAll('.category.dragging').forEach(el => el.classList.remove('dragging'));
  document.querySelectorAll('.group.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onDragOverGroup(e, groupId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (state.dragOverGroup !== groupId) { state.dragOverGroup = groupId; render(); }
}
function onDragLeaveGroup(e) {
  if (e.currentTarget && !e.currentTarget.contains(e.relatedTarget)) {
    state.dragOverGroup = null;
  }
}
function onDropGroup(e, groupId) {
  e.preventDefault();
  const cat = state.dragCat || e.dataTransfer.getData('text/plain');
  if (!cat) return;

  // Remove from all groups
  state.groups.forEach(g => { g.categories = (g.categories || []).filter(c => c !== cat); });

  // Add to target group (unless ungrouped)
  if (groupId !== '__ungrouped__') {
    const target = state.groups.find(g => g.id === groupId);
    if (target) { target.categories.push(cat); }
  }

  state.dragCat = null; state.dragOverGroup = null;
  saveGroupsToFirebase();
}

// ============ INIT ============
loadConfig();
loadHours();
if (config && config.databaseURL) { render(); initFirebase(); } else { render(); }
</script>
